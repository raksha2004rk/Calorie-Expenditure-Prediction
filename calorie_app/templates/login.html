<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- Base & Body Styles --- */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #020010;
            color: #ffffff;
            margin: 0;
            /* The default cursor is now visible */
        }

        /* --- Layout Containers --- */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            perspective: 1000px;
        }

        /* --- Login Card & Form Styles --- */
        .login-card {
            width: 100%;
            max-width: 22rem; /* 352px */
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 1rem; /* 16px */
            padding: 2rem; /* 32px */
            border: 1px solid rgba(167, 139, 250, 0.2);
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.2), 0 0 50px rgba(124, 58, 237, 0.1);
            transform-style: preserve-3d;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 1.5rem; /* 32px */
        }

        .login-header h1 {
            font-size: 1.875rem; /* 30px */
            font-weight: 700;
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.6), 0 0 20px rgba(192, 132, 252, 0.4);
        }

        .login-header p {
            color: rgba(216, 180, 254, 0.8);
            margin-top: 0.5rem; /* 8px */
        }

        .login-form .form-group {
            margin-bottom: 1.5rem; /* 24px */
        }
        
        .login-form .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .login-form label {
            display: block;
            font-size: 0.875rem; /* 14px */
            font-weight: 500;
            color: #e9d5ff;
            margin-bottom: 0.5rem; /* 8px */
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            top: 50%;
            left: 0.75rem; /* 12px */
            transform: translateY(-50%);
            width: 1.25rem; /* 20px */
            height: 1.25rem; /* 20px */
            color: #c084fc;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem; /* 12px 16px 12px 40px */
            background-color: rgba(17, 24, 39, 0.5);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 0.5rem; /* 8px */
            color: #ffffff;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        
        .form-input::placeholder {
            color: #6b7280;
        }

        .form-input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.5);
        }

        .forgot-password a {
            font-size: 0.875rem; /* 14px */
            color: #d8b4fe;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #f3e8ff;
        }
        
        /* Custom Checkbox Styles */
        .remember-me {
            display: flex;
            align-items: center;
        }
        .remember-me label {
            color: #d8b4fe;
            font-size: 0.875rem;
            margin-left: 0.5rem;
            cursor: pointer;
            margin-bottom: 0; /* Override default label margin */
        }
        .remember-me input[type="checkbox"] {
            display: none;
        }
        .remember-me .custom-checkbox {
            width: 16px;
            height: 16px;
            background-color: rgba(17, 24, 39, 0.5);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 4px;
            display: inline-block;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .remember-me input[type="checkbox"]:checked + .custom-checkbox {
            background-color: #a855f7;
            border-color: #a855f7;
        }
        .remember-me .custom-checkbox::after {
            content: '';
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .remember-me input[type="checkbox"]:checked + .custom-checkbox::after {
            display: block;
        }


        .submit-button-wrapper {
            padding: 1px;
            border-radius: 0.5rem; /* 8px */
            background-image: linear-gradient(to right, #9333ea, #ec4899, #ef4444);
            transition: all 0.3s;
        }
        
        .submit-button-wrapper:hover {
             background-image: linear-gradient(to right, #7e22ce, #db2777, #dc2626);
        }

        .submit-button {
            width: 100%;
            background-color: rgba(17, 24, 39, 0.8);
            color: #ffffff;
            font-weight: 700;
            padding: 0.75rem 1rem;
            border-radius: 0.4rem; /* Slightly smaller than wrapper */
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-button:hover {
            background-color: rgba(17, 24, 39, 0.9);
        }

        .signup-link {
            margin-top: 2rem; /* 32px */
            text-align: center;
            color: #9ca3af;
        }

        .signup-link a {
            font-weight: 500;
            color: #c084fc;
            text-decoration: none;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #d8b4fe;
        }


        /* --- Background & Cursor Effects --- */
        .starry-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(hsl(280, 100%, 80%), rgba(216, 180, 254, 0.2) 2px, transparent 40px),
                radial-gradient(hsl(320, 100%, 80%), rgba(255, 182, 229, 0.15) 1px, transparent 30px),
                radial-gradient(hsl(180, 100%, 80%), rgba(179, 255, 255, 0.1) 2px, transparent 40px),
                radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px; 
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            animation: move-stars 180s linear infinite;
        }

        @keyframes move-stars {
            from { background-position: 0 0, 40px 60px, 130px 270px, 70px 100px; }
            to { background-position: -10000px 5000px, -10000px 5000px, -10000px 5000px, -10000px 5000px; }
        }

        .cursor-glow {
            position: fixed;
            left: 0;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 20px 5px rgba(192, 132, 252, 0.7), 0 0 30px 10px rgba(139, 92, 246, 0.4);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            transform: translate(-50%, -50%);
        }
        
        .particle {
            position: fixed;
            left: 0;
            top: 0;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            animation: particle-fade 1s forwards;
            transform: translate(-50%, -50%);
        }

        @keyframes particle-fade {
            from {
                opacity: 1;
                transform: scale(1) translate(-50%, -50%);
            }
            to {
                opacity: 0;
                transform: scale(0) translate(-50%, -50%) rotate(90deg);
            }
        }

    </style>
</head>
<body>

    <!-- Starry background container -->
    <div class="starry-background"></div>

    <!-- Main container for centering the login form -->
    <div class="main-container">
        
        <!-- Login form container with an ID for JavaScript targeting -->
        <div id="login-card" class="login-card">
            
            <!-- Header -->
            <div class="login-header">
                <h1> LOGIN</h1>
                <p>Securely access your account</p>
            </div>
            

            

            <!-- Login Form -->
            <form id="login-form" class="login-form" action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Email or Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required class="form-input">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required class="form-input">
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me" class="custom-checkbox"></label>
                        <label for="remember-me">Remember me</label>
                    </div>
                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>

                <div class="form-group">
                    <div class="submit-button-wrapper">
                        <button type="submit" class="submit-button">
                            LOGIN
                        </button>
                    </div>
                </div>
            </form>

            <!-- Sign Up Link -->
            <div class="signup-link">
                <p>Don't have an account? 
                    <a href="#">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <!-- JavaScript for effects -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Element References ---
            const card = document.getElementById('login-card');
            const container = document.querySelector('.main-container');
            const loginForm = document.getElementById('login-form');
            const usernameInput = document.getElementById('username');
            const rememberMeCheckbox = document.getElementById('remember-me');

            // --- 3D Card Effect ---
            container.addEventListener('mousemove', (e) => {
                let xAxis = (e.pageX - window.innerWidth / 2) / 25; 
                let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            container.addEventListener('mouseenter', () => {
                card.style.transition = 'none';
            });

            container.addEventListener('mouseleave', () => {
                card.style.transition = 'all 0.5s ease';
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });

            // --- Glowing Cursor & Particle Trail Effect ---
            const cursorGlow = document.createElement('div');
            cursorGlow.classList.add('cursor-glow');
            document.body.appendChild(cursorGlow);

            const particleColors = ['#c084fc', '#f472b6', '#60a5fa', '#34d399', '#fbbf24'];
            let moveCounter = 0; // Throttling counter

            document.addEventListener('mousemove', (e) => {
                cursorGlow.style.left = `${e.clientX}px`;
                cursorGlow.style.top = `${e.clientY}px`;
                moveCounter++;
                if (moveCounter % 3 !== 0) return;
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = `${e.clientX}px`;
                particle.style.top = `${e.clientY}px`;
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            });

            // --- "Remember Me" Functionality ---
            // On page load, check if a username is saved in localStorage
            const savedUsername = localStorage.getItem('rememberedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMeCheckbox.checked = true;
            }

            // When the form is submitted, save or remove the username
            loginForm.addEventListener('submit', (e) => {
                // e.preventDefault(); // Prevent actual submission for this demo
                
                if (rememberMeCheckbox.checked) {
                    localStorage.setItem('rememberedUsername', usernameInput.value);
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
                // In a real app, you would now submit the form data to the server.
                // alert('Form submitted!'); 
            });
        });
    </script>

</body>
</html>
