<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="card">
<h2>Calorie Predictor</h2>

<form method="POST">

<input name="age" placeholder="Age" required>

<select name="sex">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<input name="height" placeholder="Height (cm)" required>
<input name="weight" placeholder="Weight (kg)" required>
<input name="duration" placeholder="Duration (min)" required>
<input name="heart_rate" placeholder="Heart Rate" required>
<input name="body_temp" placeholder="Body Temp" required>

<button>Predict Calories</button>
</form>

{% if result %}
<h3>Calories Burned: {{ result }}</h3>
{% endif %}

<a href="/logout">Logout</a>

</div>

</body>
</html>
